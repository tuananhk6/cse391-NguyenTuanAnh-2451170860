<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multimedia</title>
</head>

<body>

<h1>Không Giới Hạn Store</h1>
<svg width="120" height="120">
    <circle cx="60" cy="60" r="50" fill="blue"></circle>
    <text x="35" y="68" fill="white" font-size="20">TLU</text>
</svg>
<h2>Sản phẩm nổi bật</h2>

<figure>
    <img src="iphone.jpg"
         alt="Điện thoại iPhone 16 Pro Max màu đen"
         loading="lazy"
         style="max-width:100%; height:auto;">
    <figcaption>iPhone 16 Pro Max - 25.990.000đ</figcaption>
</figure>

<figure>
    <img src="laptop.jpg"
         alt="Laptop Dell XPS màu bạc"
         loading="lazy"
         style="max-width:100%; height:auto;">
    <figcaption>Laptop Dell XPS - 32.000.000đ</figcaption>
</figure>

<figure>
    <img src="watch.jpg"
         alt="Đồng hồ thông minh màu đen"
         loading="lazy"
         style="max-width:100%; height:auto;">
    <figcaption>Smart Watch - 3.500.000đ</figcaption>
</figure>

<h2>Video giới thiệu sản phẩm</h2>

<iframe width="560" height="315"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
title="YouTube video"
allowfullscreen>
</iframe>

<h2>Video quảng cáo</h2>

<video controls poster="poster.jpg" width="500">
    <source src="video.mp4" type="video/mp4">
    <source src="video.webm" type="video/webm">
</video>

<h2>Nhạc nền giới thiệu</h2>

<audio controls>
    <source src="music.mp3" type="audio/mpeg">
</audio>

</body>
</html>
